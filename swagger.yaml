    put:
      operationId: updateUser
      summary: Update a specific user
      description: >-
        Each team member can edit their own details; admins can update anyone's.
        The API can edit these fields: first_name, last_name, company, and
        bcc_email. Set bcc_email to true to generate a new BCC email address,
        otherwise omit it — you can only update bcc_email for yourself.
      tags:
      - Users
      parameters:
      - $ref: '#/components/parameters/path_user_id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                first_name:
                  $ref: '#/components/schemas/User/properties/first_name'
                last_name:
                  $ref: '#/components/schemas/User/properties/last_name'
                company_name:
                  $ref: '#/components/schemas/User/properties/company_name'
                bcc_email:
                  type: string
                  description: >-
                    Should the BCC email address be re-generated for this user (you can only update this field for yourself)
                  example: 'true'
      responses:
        200:
