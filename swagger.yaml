        type:
          description: >-
            Type of the deal field. There are several types of custom fields that may store data in different formats.
            External ID type is a special type introduced for referencing entities in the external systems. Its value
            is unique amid the whole system. Section divider type is introduced just for visual purpose: it
            allows grouping custom fields. If custom fields in the section don't have values then they are hidden in
            the 'view' UI (but always shown in 'edit' UI). This logic is applied in the API: if a deal doesn't have
            values for all the custom fields in the section then this section divider custom field isn't exposed
            in the API (along with other custom fields inside the section).
          type: string
          enum:
          - date
          - multi_line_text
          - multiple_choice
          - number
          - select_box
          - single_line_text
