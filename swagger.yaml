components:
  schemas:
    Bootstrap:
      description: >-
        Bootstrap is a general wrapper around useful information you might need to interact with your
        OnePageCRM account using the API.
      properties:
        user_id:
          type: string
          format: bson-id
          description: ID of the logged API user
          readOnly: true
          example: 5aba31e99007ba0f570c12f7
        auth_key:
          type: string
          description: Key used to sign API requests as a means of authentication
          readOnly: true
          example: c+g0Y3VGHdIztKbHcjVcOuwf34EmFlXI9Qot5hTvb2F=
        user:
          $ref: '#/components/schemas/User'
        team:
          type: array
          description: List of users who make up the rest of the logged API users team
          readOnly: true
          items:
            $ref: '#/components/schemas/User'
        account_type:
          type: string
          description: Descriptor for the type of the logged API user's account
          enum:
          - pro
          - trial
          - free
          readOnly: true
          example: pro
        settings:
          $ref: '#/components/schemas/Settings'
        cost_setup:
          $ref: '#/components/schemas/Cost_setup'
        custom_fields:
          type: array
          description: List of custom fields for the logged API user's account
          readOnly: true
          items:
            $ref: '#/components/schemas/Custom_field'
        company_fields:
          type: array
          description: List of company fields for the logged API user's account
          readOnly: true
          items:
            $ref: '#/components/schemas/Company_field'
        deal_fields:
          type: array
          description: List of deal fields for the logged API user's account
          readOnly: true
          items:
            $ref: '#/components/schemas/Deal_field'
        filters:
          type: array
          description: List of custom filters for the logged API's users account
          readOnly: true
          items:
            $ref: '#/components/schemas/Filter'
        call_results:
          type: object
          description: Map of call result keys to their display labels for the logged API's users account
          additionalProperties:
            type: string
          readOnly: true
          example:
            interested: Interested
            not_interested: Not interested
            left_message: Left message
            no_answer: No answer
            other: Other
        call_results_order:
          type: array
          description: Order for the list of call results for the logged API's users account
          items:
            type: string
          readOnly: true
          example:
          - interested
          - not_interested
          - left_message
          - no_answer
          - other
        next_action_dates:
          type: array
          description: Quick date options for ease of date selection when creating new actions
          readOnly: true
          items:
            properties:
              number:
                type: integer
                format: int32
                description: Number of periods
                readOnly: true
                example: 5
              period:
                type: string
                description: Period type
                enum:
                - days
                - weeks
                - months
                readOnly: true
                example: days
        predefined_actions:
          description: "The account's predefined actions (called 'Saved Actions' in the app)."
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/Predefined_action'
        contact_titles:
          type: array
          description: List of titles which can be used to prefix the names of contacts
          items:
            type: string
            maxLength: 7
          readOnly: true
          example:
          - Mr
          - Mrs
          - Ms
    User:
      description: >-
        Useful information about the logged user and other members of the team. Each can update their own info.
        Admins can update all.
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the user
          readOnly: true
          example: 5aba31e99007ba0f570c12f7
        first_name:
          type: string
          description: First name of the user
          example: Jane
        last_name:
          type: string
          description: Last name of the user
          example: Doe
        email:
          type: string
          description: Email address of the user
          example: jane.doe@{foo.bar}
        company_name:
          type: string
          description: Name of the company that the user works for
          example: Big Company Inc.
        account_rights:
          type: array
          description: List of permissions which the user possesses
          readOnly: true
          items:
            type: string
            enum:
            - account_owner
            - admin
            - activity
            - create_report
            - edit_target
            - deal_items
            - delete_contacts
            - delete_deals
            - pipeline
            - export
            - private_contacts
            - bulk_status
            - bulk_owner
            - save_to_google_contacts
            - download_contact_vcard
            - emails_full_sync
            - manage_autoflows
            - webforms
          example:
          - activity
          - edit_target
          - pipeline
          - export
          - private_contacts
        photo_url:
          type: string
          description: URL of the user’s profile picture
          readOnly: true
          example: https://{foo.bar}/jane-doe.jpg
        country_code:
          type: string
          description: ISO-3166 country code of the users address
          readOnly: true
          example: IE
        bcc_email:
          type: string
          description: BCC email dropbox address of the user (you only see your own)
          readOnly: true
          example: 5abg31e93007ba0f470c92q6@users.onepagecrm.com
        google_contacts_email:
          type: string
          description: Google Contacts email address of the user (you only see your own)
          readOnly: true
          example: jane.doe@{googles.mail.service}
    Contact:
      description: >-
        Information about the people you are actively trying to sell to, and related sub-resources like
        Actions, Deals, Notes, Calls and Meetings.
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the contact
          readOnly: true
          example: 5aba31ea9007ba0f570c92d4
        title:
          type: string
          description: The title of the contact
          enum: [ Mr, Mrs, Ms ]
          example: Mr
        first_name:
          type: string
          description: First name of the contact
          maxLength: 25
          example: Joe
        last_name:
          type: string
          description: Last name of the contact
          maxLength: 25
          example: Bloggs
        job_title:
          type: string
          description: Job title of the contact
          maxLength: 1000
          example: Engineer
        starred:
          type: boolean
          description: Is the contact starred?
          example: true
          default: false
        photo_url:
          type: string
          description: URL of the contact's photo
          readOnly: true
          example: https://{foo.bar}/joe-bloggs.jpg
        company_id:
          type: string
          format: bson-id
          description: ID of the company, to which the contact belongs
          example: 5aba31ea9007ba0f570c92d5
        company_name:
          type: string
          description: Name of the company, to whom the contact belongs
          maxLength: 55
          example: Morgan's Forensic Lab
        url:
          type: array
          description: URLs associated with the contact
          items:
            properties:
              type:
                type: string
                description: The type of URL
                enum: [website, blog, twitter, linkedin, xing, facebook, google_plus, other]
                example: linkedin
              value:
                type: string
                description: The URL associated with the contact
                example: https://www.linkedin.com/{joe.bloggs}
        phones:
          type: array
          description: Phone numbers associated with the contact
          items:
            properties:
              type:
                type: string
                description: The type of phone number
                enum: [work, mobile, home, direct, fax, company, other]
                example: work
              value:
                type: string
                description: The phone number associated with the contact
                example: (912) 644-1770
        emails:
          type: array
          description: Email addresses associated with the contact
          items:
            properties:
              type:
                type: string
                description: The type of email address
                enum: [work, home, other]
                example: work
              value:
                type: string
                description: The email address associated with the contact
                example: joe.bloggs@{foo.bar}
        address_list:
          description: An array of contact addresses.
          type: array
          maxItems: 2
          items:
            $ref: '#/components/schemas/Typed_address'
        status:
          type: string
          description: Status of the contact
          readOnly: true
          example: Prospect
        status_id:
          type: string
          format: bson-id
          description: ID of the status of the contact
          example: 5e31e030849d781e837b6ba1
        tags:
          description: "Tags on the contact — free-form strings from the account's tag list."
          type: array
          items:
            type: string
          example: [ Java, Android, iOS ]
        lead_source_id:
          type: string
          description: ID of the lead source of the contact
          example: email_web
        lead_source:
          type: string
          description: Display name of the lead source of the contact
          example: Email or Web
        background:
          type: string
          description: Background infomation about the contact
          maxLength: 10240
          example: >-
            I met Joe Bloggs at the annual Eco Conference in Florida. Her company currently provides
            solar panels (along with a lot of other stuff) to the State Government of California, Nevada, Oregon,
            Arizona and Utah for capital building projects. Her current supplier is crazy expensive! I've asked
            to be able to tender for their next order.
        owner_id:
          type: string
          format: bson-id
          description: ID of the user, to whom the contact belongs. Defaults to the logged API user's ID.
          example: 5aba31e99007ba0f570c92a5
        custom_fields:
          description: "Custom field values on the contact, as custom field and value pairs."
          type: array
          items:
            type: object
            properties:
              custom_field:
                $ref: '#/components/schemas/Custom_field'
              value:
                type: string
                description: Value for the custom field
                example: Summer
        letter:
          type: string
          description: The first letter of the contacts last name
          readOnly: true
          example: b
        pending_deal:
          type: boolean
          description: Does the contact have one or more pending deals?
          readOnly: true
          example: true
        total_pendings:
          type: number
          description: The total value of all pending deals for the contact
          readOnly: true
          example: 999.99
        total_deals_count:
          type: integer
          format: int32
          description: Number of deals associated with the contact
          readOnly: true
          example: 3
        company_size:
          type: integer
          format: int32
          description: Number of contacts within the contact's company
          readOnly: true
          example: 1
        sales_closed_for:
          type: array
          description: A list of user IDs, for whom the sales cycle is closed
          readOnly: true
          items:
            type: string
          example: [ 5aba31e99007ba0f570c12f7 ]
        closed_sales:
          type: array
          description: A list of closed sales objects
          readOnly: true
          items:
            properties:
              user_id:
                type: string
                format: bson-id
                description: ID of the user, for whom the sales cycle is closed
                readOnly: true
                example: 5aba31e99007ba0f570c12f7
              closed_at:
                type: integer
                format: unix-timestamp
                description: Time that the sales cycle was closed
                readOnly: true
                example: 1524818902
              comment:
                type: string
                maxLength: 140
                description: An optional message detailing why the sales cycle was closed
                readOnly: true
                example: Client is no longer interested
        google_contacts_data:
          description: The google contacts data associated with this contact
          readOnly: true
          properties:
            account_email:
              type: string
              description: Google contacts email
              readOnly: true
              example: jane.doe@{googles-mail-service}
            id:
              type: string
              description: Google contact id
              readOnly: true
              example: 342c5b5c08d4b0b2
            saved_at:
              type: integer
              format: unix-timestamp
              description: Time the contact was saved to google
              readOnly: true
              example: 1522840153
        created_at:
          type: string
          format: date-time
          description: Creation time of the contact
          readOnly: true
          example: '2018-05-16T11:52:09Z'
        modified_at:
          type: string
          format: date-time
          description: Last modification time of the contact
          readOnly: true
          example: '2018-05-16T11:52:09Z'
    Company:
      description: >-
        Referred to as 'organizations' in the web application. Companies are logical collections of Contacts and
        related sub-resources e.g. Deals, Actions and some basic info on the org. e.g. postal address, website. A
        Company may not be created directly or exist without a Contact.
      required:
      - name
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the company
          readOnly: true
          example: 5aba31e99007ba0f570c92ac
        image:
          type: string
          description: Base64 encoded binary image
          example: data:image/png;base64,iVBORw...
        name:
          type: string
          description: Name of the company
          maxLength: 55
          example: Crockett & Tubbs Security
        description:
          type: string
          description: Description of the company
          maxLength: 10240
          example: For all your security needs
        phone:
          type: string
          description: Phone number of the company
          example: (912) 644-1771
        photo_url:
          type: string
          description: URL to company logo
          example: https://someserver.com/someimage.png
        url:
          type: string
          description: URL of the company
          example: https://{foo.bar}
        address:
          description: "The company's postal address."
          $ref: '#/components/schemas/Address'
        company_fields:
          description: "Custom field values on the company."
          type: array
          items:
            type: object
            properties:
              company_field:
                $ref: '#/components/schemas/Company_field'
              value:
                type: string
                description: Value for the company field
                example: Large
        syncing_status:
          type: boolean
          description: Should all contacts in this company share the same status?
          example: true
        synced_status_id:
          type: string
          format: bson-id
          description: ID of the status, that all contacts within this company are synced to
          example: 5aaa9b039007ba08c9ebaf0a
        syncing_tags:
          type: boolean
          description: Should all contacts in this company share the same tags?
          example: true
        synced_tags:
          type: array
          description: Tags that all contacts within this company share
          items:
            type: string
          example: [ Java, Android, iOS ]
        contacts_count:
          type: integer
          format: int32
          description: Number of contacts in this company
          readOnly: true
          example: 3
        won_deals_count:
          type: integer
          format: int32
          description: Number of deals closed with contacts in this company
          readOnly: true
          example: 5
        total_won_amount:
          type: number
          description: The total value of the won deals with contacts in this company
          readOnly: true
          example: 999.99
        pending_deals_count:
          type: integer
          format: int32
          description: Number of the pending deals with contacts in this company
          readOnly: true
          example: 1
        total_pending_amount:
          type: number
          description: The total value of the pending deals with contacts in this company
          readOnly: true
          example: 99.99
        contacts:
          description: List of contacts in the comapny
          type: array
          readOnly: true
          items:
            type: object
            properties:
              contact:
                $ref: '#/components/schemas/Contact'
              next_actions:
                type: array
                items:
                  $ref: '#/components/schemas/Action'
              next_action:
                $ref: '#/components/schemas/Action'
              queued_actions:
                type: array
                items:
                  $ref: '#/components/schemas/Action'
              next_action_conflicts:
                type: array
                items: {}
                example: []
        pending_deals:
          description: "Pending deals across the company's contacts."
          type: array
          readOnly: true
          items:
            type: object
            properties:
              deal:
                $ref: '#/components/schemas/Deal'
        created_at:
          type: string
          format: date-time
          description: Creation time of the company
          readOnly: true
          example: '2018-05-16T11:52:09Z'
        modified_at:
          type: string
          format: date-time
          description: Last modification time of the company
          readOnly: true
          example: '2018-05-16T11:52:09Z'
    Action:
      description: >-
        Completable tasks related to Contacts. ASAP first, then dated actions ordered by due date (overdue first),
        followed by waiting for (blocked) and finally queued actions (without any date).
      required:
      - assignee_id
      - contact_id
      - text
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the action
          readOnly: true
          example: 5aeac8789007ba56ffca92b9
        assignee_id:
          type: string
          format: bson-id
          description: ID of the user, to whom the action is assigned. Defaults to the logged API user's ID.
          example: 5aaa9b009007ba08c9ebaef7
        contact_id:
          type: string
          format: bson-id
          description: ID of the contact, with whom the action is associated
          example: 5aba31ea9007ba0f570c92d4
        text:
          type: string
          description: The main text/description of the action
          maxLength: 140
          example: '#1 Email Jane introducing our organization'
        status:
          type: string
          description: Status of the action
          enum:
          - asap
          - date
          - date_time
          - waiting
          - queued
          - queued_with_date
          - done
          example: date_time
          default: date
        date:
          type: string
          format: date
          description: >-
            Due date for the action (status must be one of `date`, `date_time` or `queued_with_date`).
            Defaults to today's date.
          example: '2018-05-16'
        exact_time:
          type: integer
          format: unix-timestamp
          description: The UNIX Epoch time in seconds the action is due (status must be `date_time`)
          example: 1526472000
        position:
          type: integer
          format: int32
          description: The position of the action (in the list of queued actions)
          example: 1
        done:
          type: boolean
          description: Has the action been marked as complete?
          readOnly: true
          example: false
        done_at:
          type: string
          format: date
          description: The date the action was completed (only returned, if action complete)
          readOnly: true
          example: '2018-05-16'
        created_at:
          type: string
          format: date-time
          description: Creation time of the action
          readOnly: true
          example: '2018-05-16T11:52:09Z'
        modified_at:
          type: string
          format: date-time
          description: Last modification time of the action
          readOnly: true
          example: '2018-05-16T12:52:09Z'
    Deal:
      description: >-
        Represent (potential) financial transactions with your contacts. Deals include information like amount,
        deal stage, closed date or expected close date. Deals support file attachments.
      required:
      - contact_id
      - owner_id
      - name
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the deal
          readOnly: true
          example: 5aaa9b059007ba08c9ebaf58
        contact_id:
          type: string
          format: bson-id
          description: ID of the contact, to whom the deal belongs
          example: 5aaa9b059007ba08c9ebaf58
        owner_id:
          type: string
          format: bson-id
          description: ID of the user, to whom the deal belongs. Defaults to the logged API user's ID.
          example: 5aba31e99007ba0f570c12f7
        pipeline_id:
          type: string
          format: bson-id
          description: ID of a pipeline the deal belongs to
          example: 5cfa87a4849d7873db082f98
        sales_pipeline_id:
          type: string
          format: bson-id
          description: ID of a sales pipeline the deal belongs to
          example: 5cfa87a4849d7873db082f98
        name:
          type: string
          description: Name of the deal
          maxLength: 60
          example: Solar panels
        text:
          type: string
          description: Extra notes related to the deal (supports `[b]bold[/b]` and `[i]italic[/i]` formatting)
          maxLength: 7168
          example: Fingers crossed!
        stage:
          type: integer
          format: int32
          description: >-
            A numerical representation of the progress of a pending deal (number ranging from 0 to 100 exclusive)
          example: 50
        status:
          type: string
          description: Status of the deal
          enum:
          - pending
          - won
          - lost
          example: pending
          default: pending
        expected_close_date:
          type: string
          format: date
          description: The date the deal is expected to close (status should be `pending`). Defaults to today's date.
          example: '2018-04-15'
        close_date:
          type: string
          format: date
          description: The date the deal actually closed (status should be `won` or `lost`). Defaults to today's date.
          example: '2018-04-15'
        date:
          type: string
          format: date
          description: Creation date of the deal. Defaults to today's date.
          example: '2018-04-15'
        amount:
          type: number
          format: float
          description: The monitary value of the deal (per month, if multi-month deal)
          example: 99.99
          default: 0.0
        months:
          type: integer
          format: int32
          description: Number of months the deal is to be paid for (1 for regular deals, 2+ for multi-month)
          example: 1
          default: 1
        cost:
          type: number
          format: float
          description: The monitary cost of the deal
          example: 0.0
          default: 0.0
        margin:
          type: number
          format: float
          description: Profit margin for the deal (`amount` minus `cost`)
          readOnly: true
          example: 99.99
        total_amount:
          type: number
          format: float
          description: Product of amount and months (will only differ from `amount` field, if multi-month deal)
          readOnly: true
          example: 99.99
        total_cost:
          type: number
          format: float
          description: Product of cost and months (will only differ from `cost` field, if multi-month deal)
          readOnly: true
          example: 0
        commission_base:
          type: string
          description: Base used to calculate the commission of the deal
          enum:
          - amount
          - margin
          example: amount
        commission_type:
          type: string
          description: Type of commission for the deal
          enum:
          - none
          - percentage
          - absolute
          example: none
          default: none
        commission:
          type: number
          format: float
          description: Commission payable for the deal
          example: 0.0
          default: 0.0
        commission_percentage:
          type: number
          format: float
          description: Commission percentage for the deal
          example: 0.0
          default: 0.0
        reason_lost_id:
          type: string
          format: bson-id
          description: ID of the reason lost
          readOnly: true
          example: 5aaa9b059007ba08c9ebaf58
        deal_fields:
          description: "Custom field values on the deal."
          type: array
          items:
            type: object
            properties:
              deal_field:
                $ref: '#/components/schemas/Deal_field'
              value:
                type: string
                description: Value for the deal field
                example: Large
        has_deal_items:
          type: boolean
          description: Does the deal have deal items?
          default: false
          example: true
        deal_items:
          description: "Line items on the deal — each with a name, quantity, price, cost and amount."
          type: array
          items:
            $ref: '#/components/schemas/Deal_item'
        author:
          type: string
          description: Shortened name of the creator of the deal. Defaults to the logged API user.
          example: Jane D.
        has_related_notes:
          type: boolean
          description: Does the deal have related notes?
          readOnly: true
          example: true
        attachments:
          description: "Files attached to the deal."
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/Attachment'
        contact_info:
          description: Information about the contact, to whom the deal belongs (read only).
          readOnly: true
          properties:
            contact_name:
              type: string
              description: Name of the contact associated with the deal
              readOnly: true
              example: Joe Bloggs
            company:
              type: string
              description: Name of the company associated with the deal
              readOnly: true
              example: Big Company Inc.
        owner:
          description: Information about the deal owner (read only).
          readOnly: true
          properties:
            id:
              type: string
              description: ID of the deal owner
              readOnly: true
              example: 5aba31e99007ba0f570c12f7
            name:
              type: string
              description: Name of the deal owner
              readOnly: true
              example: Joe Bloggs
            email:
              type: string
              description: Email address of the deal owner
              readOnly: true
              example: joe.bloggs@{foo.bar}
        previous_pipeline_stages:
          description:
            Returns the last stage in which the deal was for each pipeline (pipeline_id => stage)
            This field is returned only when 'include_history=true' param is supplied in query string
          type: object
          readOnly: true
          example:
            "5da7b67a849d78737812437c": 40
        created_at:
          type: string
          format: date-time
          description: Creation time of the deal
          readOnly: true
          example: '2018-03-15T16:10:45Z'
        modified_at:
          type: string
          format: date-time
          description: Last modification time of the deal
          readOnly: true
          example: '2018-03-15T16:10:45Z'
        linked_contacts:
          type: array
          readOnly: true
          description: >-
            Short form of contacts linked to the deal. Always returned with the deal payload
            (on both `GET /deals` and `GET /deals/{deal_id}`). For full contact objects use
            `fields=contacts(all)` on `GET /deals`.
          items:
            type: object
            readOnly: true
            properties:
              id:
                type: string
                format: bson-id
                description: ID of the linked contact
                readOnly: true
                example: 68b5edd78b3ee61b685c8692
              contact_name:
                type: string
                description: Full display name of the linked contact
                readOnly: true
                example: Sajed Almorsy
              company:
                type: string
                description: Display name of the company the contact belongs to (empty string if none)
                readOnly: true
                example: OnePageCRM
              photo_url:
                type: string
                description: URL of the contact's profile picture (empty string if none)
                readOnly: true
                example: ''
          example:
            - id: 68b5edd78b3ee61b685c8692
              contact_name: Sajed Almorsy
              company: OnePageCRM
              photo_url: ''
    Note:
      description: >-
        Allow you to keep track of additional information related to your contacts. Notes can include any
        information you feel is relevant e.g. interactions with that contact. Notes support file attachments.
      required:
      - contact_id
      - text
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the note
          readOnly: true
          example: 5afc1b69d556730b580596cb
        contact_id:
          type: string
          format: bson-id
          description: ID of the contact, to whom the note belongs
          example: 5ae06ef9d55673108fe8877f
        text:
          type: string
          description: Extra details related to the note(supports `[b]bold[/b]` and `[i]italic[/i]` formatting)
          maxLength: 7168
          example: I met Jane Doe at the ABC conference. She's interested in hearing about XYZ.
        date:
          type: string
          format: date
          description: Creation date of the note. Defaults to today's date.
          example: '2018-05-16'
        linked_deal_id:
          type: string
          format: bson-id
          description: ID the of the deal, to which the note is linked (`null` if no linked deal)
          nullable: true
          example: ''
        linked_deal_name:
          type: string
          description: Name of the deal, to which the note is linked (`""` if no linked deal)
          example: ''
        author:
          type: string
          description: Shortened name of the creator of the note. Defaults to the logged API user.
          example: Jane D.
        attachments:
          description: "Files attached to the note."
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/Attachment'
        created_at:
          type: string
          format: date-time
          description: Creation time of the note
          readOnly: true
          example: '2018-05-16T11:52:09Z'
        modified_at:
          type: string
          format: date-time
          description: Last modification time of the note
          readOnly: true
          example: '2018-05-16T11:52:09Z'
    Call:
      description: >-
        Allow you to keep track of phone calls made to your contacts. Calls include information like the phone
        number dialled and the call result. Calls support file attachments.
      required:
      - contact_id
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the call
          readOnly: true
          example: 5afc1b69d556730b580596cb
        contact_id:
          type: string
          format: bson-id
          description: ID of the contact, to whom the call belongs
          example: 5ae06ef9d55673108fe8877f
        text:
          type: string
          description: Extra details related to the call (supports `[b]bold[/b]` and `[i]italic[/i]` formatting)
          maxLength: 7168
          example: Mary is interested in coming into the office on Tuesday.
        call_result:
          type: string
          description: Key of the `call_result` which best describes the result of the call
          example: interested
        call_time_int:
          type: integer
          format: unix-timestamp
          description: >-
            Time the call occurred in UNIX Epoch time in seconds (defaults to current time, if left blank).
          example: 1525273653
        via:
          type: string
          description: Through which application did the call take place
          enum:
          - unknown
          - jabber
          - talkdesk
          - phone
          example: phone
          default: unknown
        phone_number:
          type: string
          description: Phone number used to make the call
          example: (912) 644-1770 (mobile)
        recording_link:
          type: string
          description: URL of the recording of the call conversation
          nullable: true
          example: ''
        author:
          type: string
          description: Shortened name of the creator of the call. Defaults to the logged API user.
          example: Jane D.
          readOnly: true
        attachments:
          description: "Files attached to the call."
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/Attachment'
        created_at:
          type: string
          format: date-time
          description: Creation time of the call
          readOnly: true
          example: '2018-05-16T11:52:09Z'
        modified_at:
          type: string
          format: date-time
          description: Last modification time of the call
          readOnly: true
          example: '2018-05-16T11:52:09Z'
        index:
          type: integer
          format: int32
          description: Index of the call (in the results set)
          readOnly: true
          example: 1
    Meeting:
      description: >-
        Allow you to keep track of meetings held with your contacts. Meetings include information like the place
        and the meeting result. Meetings support file attachments.
      required:
      - contact_id
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the meeting
          readOnly: true
          example: 5afc1b69d556730b580596cb
        contact_id:
          type: string
          format: bson-id
          description: ID of the contact, to whom the meeting belongs
          example: 5ae06ef9d55673108fe8877f
        text:
          type: string
          description: Extra details related to the meeting (supports `[b]bold[/b]` and `[i]italic[/i]` formatting)
          maxLength: 7168
          example: Mary is interested in coming into the office on Tuesday.
        # meeting_result:
        #   type: string
        #   format: bson-id
        #   description: ID of the `meeting_result` which best describes the result of the meeting
        #   example: interested
        meeting_time_int:
          type: integer
          format: unix-timestamp
          description: >-
            Time the meeting occurred in UNIX Epoch time (defaults to current time, if left blank)
          example: 1525273653
        place:
          type: string
          description: The place in which the meeting take place
          maxLength: 100
          example: Meeting room 1
        author:
          type: string
          description: Shortened name of the creator of the meeting. Defaults to the logged API user.
          example: Jane D.
          readOnly: true
        attachments:
          description: "Files attached to the meeting."
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/Attachment'
        created_at:
          type: string
          format: date-time
          description: Creation time of the meeting
          readOnly: true
          example: '2018-05-16T11:52:09Z'
        modified_at:
          type: string
          format: date-time
          description: Last modification time of the meeting
          readOnly: true
          example: '2018-05-16T11:52:09Z'
        index:
          type: integer
          format: int32
          description: Index of the meeting (in the results set)
          readOnly: true
          example: 1
    Address:
      description: The physical address of a contact or company.
      properties:
        address:
          type: string
          description: Property name/number and street name
          example: Unit 5, Business Innovation Centre
        city:
          type: string
          description: Name of the city
          example: Upper Newcastle
        state:
          type: string
          description: Name of the state
          example: Galway
        zip_code:
          type: string
          description: Zip code
          example: H91 Y0T0
        country_code:
          type: string
          description: ISO-3166 country code
          example: IE
    Typed_address:
      description: The physical address of a contact or company.
      properties:
        address:
          description: "Street address."
          $ref: '#/components/schemas/Address/properties/address'
        city:
          description: "City."
          $ref: '#/components/schemas/Address/properties/city'
        state:
          description: "State, province or region."
          $ref: '#/components/schemas/Address/properties/state'
        zip_code:
          description: "Postal or ZIP code."
          $ref: '#/components/schemas/Address/properties/zip_code'
        country_code:
          description: "ISO 3166 country code, upper-case."
          $ref: '#/components/schemas/Address/properties/country_code'
        type:
          type: string
          description: Type of the address
          default: work
          enum:
            - work
            - home
            - billing
            - delivery
            - other
          example: delivery
    Attachment:
      description: >-
        Additional files associated with Deals, Notes, Calls or Meetings. They can be uploaded and stored in S3,
        or stored in external providers i.e. Google Drive, Dropbox, Evernote.
      required:
      - filename
      - size
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the attachment
          readOnly: true
          example: 5afc1ea9d556730b780096db
        filename:
          type: string
          description: Name of the attachment file
          example: mario.jpg
        custom_filename:
          type: string
          description: Custom name of the attachment file
          example: another_mario.jpg
        pinned:
          type: boolean
          description: Show if the attachment is pinned to its owner contact
          example: true
        pinned_at:
          type: string
          description: Shows pinned at timestamp. Is null if pinned == false
          example: '2022-01-24T10:42:39Z'
        size:
          type: integer
          format: int32
          description: Size of the attachment file (in bytes)
          example: 3841
        storage_provider:
          type: string
          description: Name of the storage provider (where the attachment file is stored)
          readOnly: true
          enum:
          - amazon
          - google_drive
          - dropbox
          - evernote
          example: amazon
        url:
          type: string
          description: External URL of the attachment file
          readOnly: true
          example: https://{foo.bar}/mario.jpg
        url_expires_at:
          type: string
          format: date-time
          description: The time the attachment URL expires
          readOnly: true
          example: '2018-05-16T13:06:53Z'
        thumbnail:
          type: object
          description: >-
            An image preview of the attachment file (if one exists)
          properties:
            url:
              readOnly: true
              type: string
              description: External URL of the attachment's thumbnail
              example: https://{foo.bar}/mario-thumbnail.jpg
    Relationship_Type:
      description: >-
        The relationship types that identifies the relationships between the contacts.
      required:
      - relationship_variants
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the relationship type
          readOnly: true
          example: 5aaa9b059007ba08c9ebaf58
        symmetrical:
          type: boolean
          description: Is the relationship symmetrical? (read only).
          readOnly: true
          example: true
        relationship_variants:
          description: "The directional variants of this relationship type."
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: bson-id
                description: ID of the relationship type
                readOnly: true
                example: 5aaa9b059007ba08c9ebaf59
              name:
                type: string
                description: The relationship variant name
                example: Partner
        created_at:
          type: string
          format: date-time
          description: Creation time of the relationship type
          readOnly: true
          example: '2018-03-15T16:10:45Z'
        modified_at:
          type: string
          format: date-time
          description: Last modification time of the relationship type
          readOnly: true
          example: '2018-03-15T16:10:45Z'
    Related_contact:
      minItems: 2
      maxItems: 2
      type: array
      description: The contacts participating in the relationship along with their associated variant names
      items:
        type: object
        properties:
          variant_id:
            type: string
            format: bson-id
            description: ID of the relationship variant
            example: 5aaa9b059007ba08c9ebaf59
          variant_name:
            type: string
            description: The name of the variant
            maxLength: 35
            readOnly: true
            example: Partner
          contact_id:
            type: string
            format: bson-id
            description: ID of the contact
            example: 5aba31ea9007ba0f570c92d4
          first_name:
            type: string
            description: The first name of the contact
            maxLength: 35
            readOnly: true
            example: Joe
          last_name:
            type: string
            description: The last name of the contact
            maxLength: 35
            readOnly: true
            example: Bloggs
          photo_url:
            type: string
            description: URL of the contact’s photo
            readOnly: true
            example: "https://{foo.bar}/joe-bloggs.jpg"
          company_id:
            type: string
            format: bson-id
            description: ID of the company, to which the contact belongs
            readOnly: true
            example: 5aba31ea9007ba0f570c92d5
          company_name:
            type: string
            description: Name of the company, to whom the contact belongs
            maxLength: 55
            readOnly: true
            example: Morgan's Forensic Lab
          owner_id:
            type: string
            format: bson-id
            description: ID of the user, to whom the contact belongs
            readOnly: true
            example: 5aba31e99007ba0f570c92a5
      example:
        - variant_id: 5aaa9b059007ba08c9ebaf59
          variant_name: Partner
          contact_id: 5aba31ea9007ba0f570c92d4
          first_name: Joe
          last_name: Bloggs
          company_id: 5aba31ea9007ba0f570c92f1
          company_name: Morgan's Forensic Lab
          photo_url: https://{foo.bar}/joe-bloggs.jpg
          owner_id: 5aba31ea9007ba0f570c92c3
        - variant_id: 5aaa9b059007ba08c9ebaf59
          variant_name: Partner
          contact_id: 5aba31ea9007ba0f570c92d5
          first_name: Jane
          last_name: Doe
          company_id: 5aba31ea9007ba0f570c92f3
          company_name: Acme Inc
          photo_url: https://{foo.bar}/jane-doe.jpg
          owner_id: 5aba31ea9007ba0f570c92c3
    Relationship:
      description: >-
        The relationship mapping between contacts
      required:
      - relationship_type_id
      - related_contacts
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the relationship
          readOnly: true
          example: 5aaa9b059007ba08c9ebaf57
        relationship_type_id:
          type: string
          format: bson-id
          description: ID of the relationship type
          example: 5aaa9b059007ba08c9ebaf58
        related_contacts:
          $ref: '#/components/schemas/Related_contact'
        created_at:
          type: string
          format: date-time
          description: Creation time of the relationship
          readOnly: true
          example: '2018-03-15T16:10:45Z'
        modified_at:
          type: string
          format: date-time
          description: Last modification time of the relationship
          readOnly: true
          example: '2018-03-15T16:10:45Z'
    Email_address:
      description: Email address with name to represent email header
      properties:
        address:
          type: string
          description: Email address
          example: 'joes.boss@bar.foo'
        name:
          type: string
          nullable: true
          description: Name associated with the email address
          example: 'Joes Boss'
    Notification:
      description: A serialised notification. There are different types of notifications, each can have its own properties
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the notification
          readOnly: true
          example: 5aead4809007ba56ffca942e
        type:
          type: string
          description: Type of the notification
          enum:
            - assigned_action
            - action_with_time
            - contact_assigned
            - call
            - meeting
            - email
            - link
            - note
          readOnly: true
          example: assigned_action
        by:
          type: string
          description: User name that caused the notification
          readOnly: true
          example: Vlad K.
        read:
          type: boolean
          description: Tells if notification was marked as read
          example: true
        user_id:
          type: string
          format: bson-id
          description: The ID of affected user, ID of assignee user
          readOnly: true
          example: 5aead4809007ba56ffca942e
        contact_id:
          type: string
          format: bson-id
          description: The ID of a contact related to which the notification has been created
          readOnly: true
          example: 5aead4809007ba56ffca942e
        created_at:
          type: string
          #format: iso8601
          description: Date which tells when the notification was created
          readOnly: true
          example: '2019-06-21T16:53:12Z'
        modified_at:
          type: string
          #format: iso8601
          description: Date which tells when the notification was last updated
          readOnly: true
          example: '2019-06-21T16:53:12Z'
        mobile_data:
          type: object
          description: Data created for the purpose of push notifications for mobile apps
          readOnly: true
          properties:
            title:
              type: string
              description: Title of push notification
              readOnly: true
              example: 'Action assigned to you (by User N.)'
            body:
              type: string
              description: Body of push notification
              readOnly: true
              example: '17:13: in bulk'
            action_type:
              type: string
              description: Type of action
              readOnly: true
              example: 'action_with_time'
    Settings:
      description: Application settings for the logged API user e.g. localization and for the account e.g. deal stages.
      properties:
        reminder:
          $ref: '#/components/schemas/Reminder'
        time_zone:
          type: string
          description: The time zone, for the API logged user
          example: America/Los_Angeles
        not_working_days:
          type: string
          description: >-
            The days of the week, on which the user does not work (used to calculate the due date of promoted actions)
          enum:
          - none
          - weekend
          - sunday
          example: weekend
          default: none
        date_format:
          type: string
          description: The logged API users preferred format for date strings
          example: '%d/%m/%Y'
        time_with_ampm:
          type: boolean
          description: Use AM/PM (12-hour clock) for the time component of dates
          example: true
        listing_size:
          type: integer
          format: int32
          description: The number of items requested per page when scrolling
          example: 10
          default: 25
        currency:
          type: string
          description: The currency for the account (only editable by admins)
          example: USD
        currency_symbol:
          type: string
          description: The currency symbol for the account (only editable by admins)
          example: $
        separator:
          type: string
          description: Symbol used to represent a decimal separator
          example: '.'
        delimiter:
          type: string
          description: Symbol used to represent a thousands delimiter
          example: ','
        popular_countries:
          type: array
          description: The last 5 countries that were used in contact/company addresses
          items:
            type: string
          readOnly: true
          example:
          - US
          - UK
          - IE
          - AU
          - DE
        deal_stages:
          description: "The account's configured deal stages."
          type: array
          items:
            $ref: '#/components/schemas/Deal_stage'
        pipelines:
          description: "The account's pipelines."
          type: array
          items:
            properties:
              pipeline:
                $ref: '#/components/schemas/Pipeline'
        default_contact_type:
          type: string
          description: Denotes whether the logged API user, thinks of sales as people or organizations
          enum:
          - company
          - individual
          example: company
        show_tidy_stream:
          type: boolean
          description: Only show contacts with actions in the action stream?
          example: false
        show_company_fields_with_contact:
          type: boolean
          description: Show organizational fields in contact view?
          example: true
        company_phone_enabled:
          type: boolean
          description: Is the company phone field enabled?
          example: true
        company_url_enabled:
          type: boolean
          description: Is the company URL field enabled?
          example: true
        company_address_enabled:
          type: boolean
          description: Is the company address field enabled?
          example: true
        company_description_enabled:
          type: boolean
          description: Is the company description field enabled?
          example: true
        send_push_notifications:
          type: boolean
          description: Should the user receive push notifications?
          example: true
        clipper_beta:
          type: boolean
          description: Has the user enabled the clipper beta feature?
          example: false
        bcc_email_enabled:
          type: boolean
          description: Has the user enabled the Bcc Capture address?
          example: true
    Status:
      description: >-
        Values which help qualify where contacts are in the sales pipeline. The list of Statuses is
        already populated but it may be updated if needed, to better fit your organization.
      required:
      - text
      - color
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the status
          readOnly: true
          example: 5aead4809007ba56ffca942e
        status:
          description: Type of the status
          type: string
          enum:
          - lead
          - prospect
          - customer
          - inactive
          - general
          - custom1
          - custom2
          - customX
          readOnly: true
          example: prospect
          default: lead
        text:
          type: string
          description: Display text of the status
          maxLength: 20
          example: Prospect
        description:
          type: string
          description: Longer description of what the status is for
          maxLength: 33
          example: Actively selling to these people
        color:
          type: string
          format: hex-color
          description: The color of the status (six character hex value)
          enum:
          - '666666'
          - '3399ff'
          - 'cc0000'
          - 'f96600'
          - '000000'
          - 'ff00ff'
          - '009900'
          example: 'f96600'
        counts:
          type: integer
          format: int32
          description: Number of contacts the (logged API) user owns, with the status
          readOnly: true
          example: 3
        total_count:
          type: integer
          format: int32
          description: Number of contacts the entire team owns, with the status
          readOnly: true
          example: 3
        action_stream_count:
          type: integer
          format: int32
          description: Number of contacts the (logged API) user has actions with, who also have the status
          readOnly: true
          example: 2
        team_counts:
          type: array
          description: Number of contacts, with the status (for each team member)
          readOnly: true
          items:
            properties:
              user_id:
                $ref: '#/components/schemas/User/properties/id'
              counts:
                type: integer
                format: int32
                description: Number of contacts the team member owns, with the status
                readOnly: true
                example: 4
    Lead_source:
      description: >-
        A way to classify the source of any contact that is added to OnePageCRM. Like Statuses, this list is
        pre-populated, and can be later edited to fit individual needs.
      required:
      - text
      properties:
        id:
          type: string
          description: ID of the lead source
          readOnly: true
          example: advertisement
        text:
          type: string
          description: Description of the lead source
          maxLength: 40
          example: Advertisement
        counts:
          type: integer
          format: int32
          description: Number of contacts the (logged API) user owns, with the lead source
          readOnly: true
          example: 4
        total_count:
          type: integer
          format: int32
          description: Number of contacts the entire team owns, with the lead source
          readOnly: true
          example: 7
        action_stream_count:
          type: integer
          format: int32
          description: Number of contacts the (logged API) user has actions with, who also have the lead source
          readOnly: true
          example: 2
        team_counts:
          type: array
          description: Number of contacts, with the lead source (for each team member)
          readOnly: true
          items:
            properties:
              user_id:
                $ref: '#/components/schemas/User/properties/id'
              counts:
                type: integer
                format: int32
                description: Number of contacts the team member owns, with the lead source
                readOnly: true
                example: 4
    Filter:
      description: >-
        Allow you to query contacts in your own custom way. These filters can only be created on the website but
        they can be used through the API.
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the custom filter
          readOnly: true
          example: 5b606e239007ba1e528d9557
        name:
          type: string
          description: Name of the custom filter
          readOnly: true
          example: Jane's large deals
        conditions:
          type: array
          description: Conditions of the custom filter
          readOnly: true
          items:
            type: array
            items:
              type: string
          example:
          - - deal_owner_id
            - is
            - 5aba31e99007ba0f570c12f7
          - - deal_value
            - greater
            - '1000'
    Tag:
      description: >-
        An additional means of labeling and/or identifying contacts in OnePageCRM.
      properties:
        name:
          type: string
          description: Name of the tag
          example: VIP
        counts:
          type: integer
          format: int32
          description: Number of contacts the (logged API) user owns, with the tag
          readOnly: true
          example: 2
        total_count:
          type: integer
          format: int32
          description: Number of contacts the entire team owns, with the tag
          readOnly: true
          example: 4
        action_stream_count:
          type: integer
          format: int32
          description: Number of contacts the (logged API) user has actions with, who also have the tag
          readOnly: true
          example: 1
    Predefined_action:
      description: >-
        Template actions users may use frequently in their sales process. Referred to as 'Saved Actions' in
        the web application.
      required:
      - text
      - days
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the predefined action
          readOnly: true
          example: 5acddaa7d556733c507ff405
        text:
          type: string
          description: Description text of the predefined action
          example: '#1 Email [firstname] introducing our organization'
        days:
          type: integer
          format: int32
          description: Suggested number of days until the action becomes due
          example: 4
    Predefined_action_group:
      description: >-
        A grouping of predefined actions. Useful if actions can be assigned together as part of a workflow.
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the predefined action group
          readOnly: true
          example: 5c79510e9007ba3f7519e820
        text:
          type: string
          description: Name of the predefined action group
          example: Follow-up sequence
        position:
          type: integer
          format: int32
          description: Position of the group in the list of predefined action groups
          readOnly: true
          example: 0
        action_ids:
          type: array
          description: List of IDs of the predefined actions in the predefined action group
          items:
            type: string
            format: bson-id
          example:
          - 5acddaa7d556733c507ff405
          - 5acddaa7d556733c507ff406
    Predefined_item:
      description: >-
        A user-configured item which can aid in the creation of deal items
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the predefined item
          readOnly: true
          example: 5c79510e9007ba3f7519e819
        name:
          type: string
          description: Name of the predefined item
          example: Solar panels
        description:
          type: string
          description: Description text of the predefined item
          example: Photovoltaic solar panels (2019 model)
        cost:
          type: number
          format: float
          description: Cost of the predefined item
          example: 95.00
        price:
          type: number
          format: float
          description: Price of the predefined item
          example: 149.99
        position:
          type: integer
          format: int32
          description: Position of the predefined item in the items list
          readOnly: true
          example: 1
        item_group_id:
          type: string
          format: bson-id
          description: ID of the predefined item group (or empty if the item is not in a group)
          readOnly: true
          example: 5c9a53599007ba58f13c8119
    Deal_item:
      description: >-
        A user-configured item representing a product or service, which can be used to standardize deal creation
      required:
        - name
        - description
        - cost
        - price
        - qty
      properties:
        id:
          type: string
          format: bson-id
          readOnly: true
          description: ID of the deal item
          example: 5c7973019007ba3f7519e86a
        name:
          type: string
          description: Name of the deal item
          example: Solar panels
        description:
          type: string
          description: Description text of the deal item
          example: Photovoltaic solar panels (2019 model)
        cost:
          type: number
          format: float
          description: Cost of the deal item
          example: 95.00
        price:
          type: number
          format: float
          description: Price of the deal item
          example: 149.99
        amount:
          type: number
          format: float
          readOnly: true
          description: Amount of the deal items
          example: 299.98
        qty:
          type: integer
          format: int32
          description: Quantity of deal items
          example: 2
        deal_id:
          type: string
          format: bson-id
          readOnly: true
          description: ID of the parent deal
          example: 5aaa9b059007ba08c9ebaf58
        predefined_item_id:
          type: string
          format: bson-id
          description: ID of the predefined item used for deal item creation (can be empty)
          example: 5c6abf565481dd28ff1bc6a8
        position:
          type: integer
          format: int32
          readOnly: true
          description: Position of the predefined item in the items list
          example: 1
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Creation time of the deal item
          example: '2019-03-01T17:59:29Z'
        modified_at:
          type: string
          format: date-time
          readOnly: true
          description: Last modification time of the deal item
          example: '2019-03-01T17:59:29Z'
    Predefined_item_group:
      description: >-
        A grouping of predefined/deal items. Useful if items can be sold as part of a package or compliment one another
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the predefined item group
          readOnly: true
          example: 5c79510e9007ba3f7519e819
        name:
          type: string
          description: Name of the predefined item group
          example: Electronics
        position:
          type: integer
          format: int32
          description: Position of the group in the list of predefined item groups
          readOnly: true
          example: 1
        count:
          type: integer
          format: int32
          description: Number of predefined items in the predefined item group
          readOnly: true
          example: 2
        item_ids:
          type: array
          description: List of IDs of the predefined/deal items in the predefined item group
          readOnly: true
          items:
            type: string
            format: bson-id
          example:
          - 5c79510e9007ba3f7519e819
          - 5c9a53349007ba58f13c8118
    Custom_field:
      description: Extra user-configurable data fields for Contacts. Only editable by admins.
      required:
      - name
      - type
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the custom field
          readOnly: true
          example: 5aad9b039007ba18c9ebad13
        name:
          type: string
          description: Name of the custom field
          maxLength: 60
          example: Favorite season
        type:
          type: string
          description: >-
            Type of the custom field. There are several types of custom fields that may store data in different formats.
            External ID type is a special type introduced for referencing entities in the external systems. Its value
            is unique amid the whole system. Section divider type is introduced just for visual purpose: it
            allows grouping custom fields. If custom fields in the section don't have values then they are hidden in
            the 'view' UI (but always shown in 'edit' UI). This logic is applied in the API: if a contact doesn't have
            values for all the custom fields in the section then this section divider custom field isn't exposed
            in the API (along with other custom fields inside the section).
          enum:
          - anniversary
          - date
          - multi_line_text
          - multiple_choice
          - number
          - select_box
          - single_line_text
          - external_id
          - section_divider
          example: select_box
        position:
          type: integer
          format: int32
          description: The position of the custom field in the list
          example: 2
        choices:
          description: >-
            A list of possible choices (for fields of type `multiple_choice` or `select_box`)
          type: array
          items:
            type: string
          maxItems: 60
          example:
          - Spring
          - Summer
          - Autumn
          - Winter
    Company_field:
      description: Extra user-configurable data fields for Companies. Only editable by admins.
      required:
      - name
      - type
      properties:
        id:
          type: string
