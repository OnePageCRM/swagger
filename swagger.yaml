    put:
      operationId: swapAction
      summary: >-
        Specify action to be swapped in as the logged API users next action
      description: >-
        Resolves a date conflict between a next action and a dated queued
        action by swapping them. The swap needs a next action of status date,
        date_time or waiting, and a queued action of status queued_with_date.
        Both actions must belong to the current user, and the queued action's
        date must be before the next action's date.
      tags:
      - Actions
      parameters:
      - $ref: '#/components/parameters/path_action_id'
      responses:
        200:
          description: OK
