            External ID type is a special type introduced for referencing entities in the external systems. Its value
            is unique amid the whole system. Section divider type is introduced just for visual purpose: it
            allows grouping custom fields. If custom fields in the section don't have values then they are hidden in
            the 'view' UI (but always shown in 'edit' UI). This logic is applied in the API: if a company doesn't have
            values for all the custom fields in the section then this section divider custom field isn't exposed
            in the API (along with other custom fields inside the section).
          enum:
          - date
          - multi_line_text
          - multiple_choice
          - number
          - select_box
          - single_line_text
          - external_id
          - section_divider
          example: select_box
        position:
          type: integer
          format: int32
          description: The position of the company field in the list
          example: 2
        choices:
          description: >-
            A list of possible choices (for fields of type `multiple_choice` or `select_box`)
          type: array
          items:
            type: string
          maxItems: 60
          example:
          - Small
          - Medium
          - Large
    Deal_field:
      description: Extra user-configurable data fields for Deals. Only editable by admins.
      required:
      - name
      - type
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the deal field
          readOnly: true
          example: 5aad9b039007ba28c9ebad56
        name:
          type: string
          description: Name of the deal field
