      - $ref: '#/components/parameters/query_status_id'
      - $ref: '#/components/parameters/query_not_linked_with'
      - $ref: '#/components/parameters/query_contacts_owner_id'
      - $ref: '#/components/parameters/query_contacts_company_id'
