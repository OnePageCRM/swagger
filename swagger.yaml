  responses:
    '200':
      description: OK
    '400':
      description: >-
        Bad Request. The request is malformed — missing or invalid parameters,
        or a body that does not match the expected format. Fix the request
        before retrying. The example below shows the error envelope used for
        all responses in the 4XX range.
      content:
        application/json:
          schema:
            properties:
              status:
                type: integer
                format: int32
                description: HTTP status code of the response
                readOnly: true
                example: 400
              message:
                type: string
                description: Summary of the reason for the failure
                readOnly: true
                example: Some generic error message
              error_name:
                type: string
                description: Key used to identify which error has occurred
                readOnly: true
                example: some_generic_error_message
              error_message:
                type: string
                description: Message to be shown to the user with more details about the error
                readOnly: true
                example: Could not find suitable error message, initiating self-destruct sequence...
              errors:
                description: Specific errors (commonly associated with invalid parameters)
                readOnly: true
                properties:
                  attribute_name:
                    type: string
                    description: Reason why this parameter is invalid
                    readOnly: true
                    example: '{attribute_name} is invalid or missing'
    '401':
      description: >-
        Unauthorized. Authentication is missing, invalid or expired. Check the
        user_id and api_key pair, or refresh the OAuth access token.
      content:
        application/json:
          schema:
            properties:
              status:
                type: integer
                format: int32
                description: HTTP status code of the response
                readOnly: true
                example: 401
              message:
                type: string
                description: Summary of the reason for the failure
                readOnly: true
                example: Authorization data not found
              error_name:
                type: string
                description: Key used to identify which error has occurred
                readOnly: true
                example: authorization_data_not_found
              error_message:
                type: string
                description: Message to be shown to the user with more details about the error
                readOnly: true
                example: Cannot find suitable authorization data or data provided is not complete.
              errors:
                type: object
                readOnly: true
    '403':
      description: >-
        Forbidden. The authenticated user does not have permission for this
        operation, or an account limit has been reached. Note the request-rate
        throttle also answers 403 with a plain-text body — check the content
        type before treating a 403 as a permission error.
    '404':
      description: Not Found. No resource exists for the ID you provided.
    '409':
      description: >-
        Conflict. The current state of the record does not allow this
        operation — for example, adding an ASAP action to a contact that
        already has one for that user.
    '415':
      description: >-
        The request entity has a media type which the server or resource does not support.
        For example, the client uploads an image as image/svg+xml, but the server requires that images use a different format.
    '422':
      description: The request was well-formed (i.e., syntactically correct) but could not be processed.
    '500':
      description: >-
        Internal Server Error. Something went wrong on our side. Retry later,
        and contact support if it persists.
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
