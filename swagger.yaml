    Webhook:
      description: >-
        A simple, effective way to be notified when things happen in OnePageCRM. For more information,
        go to the 'WebHooks & More' tab at the top of the page.
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the webhook
          readOnly: true
          example: 5417f8291da41712270a0042
        name:
          type: string
          description: Name of the webhook
          maxLength: 140
          example: Awesome integration
        hook_url:
          type: string
          description: URL of the webhook
          example: https://{webhook.catching.machine}
        secretkey:
          type: string
          description: Secret key of the webhook
          example: ''
    Pipeline:
      description: >-
        Information about the sales process of products or services, including deal stages.
      properties:
        id:
          type: string
          format: bson-id
          description: ID of the pipeline
          readOnly: true
          example: 5c96306b849d78b896b6f8ca
        name:
          type: string
          description: Name of the pipeline
          example: Default pipeine
        type:
          type: string
          description: Type of the pipeline (sales or delivery)
          example: sales
        default:
          type: boolean
          description: Is this pipeline the default pipeline in the account?
          example: true
        won_column_enabled:
          type: boolean
          description: Specifies if the `WON` column is enabled for the pipeline
          example: false
        won_column_name:
          type: string
          description: Name of the `WON` column for the pipeline
          example: Payment
        stages:
          type: array
          description: Deal stages defined for the pipeline
          items:
            $ref: '#/components/schemas/Deal_stage'
    Reminder:
      description: Details about the sales action reminder email.
      properties:
        type:
          type: string
          description: The criteria which should cause a sales reminder email to be sent
          enum:
          - never
          - every_day
          - new_task
          example: new_task
