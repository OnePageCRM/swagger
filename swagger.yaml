  /attachments/s3_form:
    get:
      operationId: getAttachmentUploadForm
      summary: >-
        Get a pre-authorized S3 upload form (use to upload a file on the client side)
      description: >-
        Files must be uploaded to S3 before they can be attached to deals,
        notes, calls or meetings, and this request returns everything needed
        for that upload. Send a POST request to the URL in the response and
        include every param from the fields construct as form fields of that
        upload. Most can be sent as they are, but key must be constructed as
        {contact_id}/{timestamp}/{filename}, the filename field must match the
        filename at the end of key, and file is the file to upload. After a
        successful upload the file can be attached. Maximum file size is 10 MB;
        each account has 1 GB of storage per user. Additional information on
        the upload process:
        https://docs.aws.amazon.com/AmazonS3/latest/API/sigv4-post-example.html
      tags:
      - Attachments
      parameters:
      - in: query
        name: contact_id
        required: true
        schema:
          type: string
        description: Contact to be associated with the attachment
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                properties:
                  status:
                    $ref: '#/components/schemas/Success/properties/status'
                  message:
                    $ref: '#/components/schemas/Success/properties/message'
                  timestamp:
                    $ref: '#/components/schemas/Success/properties/timestamp'
                  data:
                    properties:
                      quota:
                        example: 1073741824
                      display_quota:
                        example: 1024MB
                      url:
                        example: https://s3-us-west-1.amazonaws.com/onepagecrm-ud2-us-west-1/
                      fields:
                        properties:
                          key:
                            example: ''
                          x-ignore-pattern:
                            example: '59bacde236aebd7842f8be7x/__timestamp__/${filename}'
                          acl:
                            example: private
                          success_action_status:
                            example: 201
                          policy:
                            example: aBcDe...aBcDe=
                          x-amz-algorithm:
                            example: AWS4-HMAC-SHA256
                          x-amz-credential:
                            example: ABCDE...ABCDE/20170914/us-west-1/s3/aws4_request
                          x-amz-date:
                            example: 20170914T184346Z
                          x-amz-signature:
                            example: aBcDe...aBcDe
        400:
          $ref: '#/components/responses/400'
        401:
          $ref: '#/components/responses/401'
        403:
          $ref: '#/components/responses/403'
        404:
          $ref: '#/components/responses/404'
        409:
          $ref: '#/components/responses/409'
        500:
          $ref: '#/components/responses/500'
