openapi: 3.0.0
info:
  title: OnePageCRM API
  description: >-
    The OnePageCRM REST API. Full guides, a per-endpoint reference, and
    copy-ready examples live at https://developer.onepagecrm.com/.


    Built something with OnePageCRM? Tell us at
    https://forms.onepagecrm.com/65d470e49e344574cb4b3e5b/ or email
    support(at)onepagecrm(dot)com.


    Authentication is HTTP Basic: your username is your user_id and your
    password is your api_key. Find both at https://app.onepagecrm.com/app/api
    (API tab).


    Conventions — pagination (page, per_page), sorting (sort_by, order), time
    filters (since, until, modified_since), partial updates (partial=true) and
    undo deletion (undo=true) — are documented on the developer portal.
  termsOfService: 'https://www.onepagecrm.com/api-use'
  version: '3.0'
servers:
- url: 'https://app.onepagecrm.com/api/v3'
  description: Production Application Server
security:
- BasicAuth: []
tags:
- name: Bootstrap
  description: "Account start-up data in a single call — settings, the logged user, and reference lists such as statuses and lead sources. Also used to log out or roll your API key."
- name: Users
  description: "The logged user and the other members of the account. Each user can update their own details; admins can update anyone's."
- name: Contacts
  description: "The people you're actively selling to. Each contact is the hub for its related actions, deals, notes, calls and meetings."
- name: Companies
  description: "Organizations that group related contacts, with shared details like postal address and website. A company can hold its own deals and actions, and always exists alongside a contact (they're called 'organizations' in the app)."
- name: Actions
  description: "The next steps to take on a contact — the heart of OnePageCRM. Actions sort ASAP first, then by due date (overdue first), then waiting-for, then undated queued items."
- name: Action Stream
  description: "Your contacts ordered by when their next action is due — the default view in the OnePageCRM app."
- name: Team Stream
  description: "The Action Stream across the whole account in one list, or for any single user — using the same next-action-due ordering."
- name: Deals
  description: "Potential sales tracked against a contact — amount, stage, and expected or actual close date. Deals support file attachments."
- name: Notes
  description: "Free-form information logged against a contact — meeting notes, context, or anything else relevant. Notes support file attachments."
- name: Calls
  description: "Phone calls logged against a contact, including the number dialled and the result. Calls support file attachments."
- name: Meetings
  description: "Meetings logged against a contact, including when they happened and the outcome. Meetings support file attachments."
- name: Attachments
  description: "Files attached to a deal, note, call or meeting — stored in OnePageCRM (S3) or linked from Google Drive, Dropbox or Evernote."
- name: Relationship Types
  description: "The labels used to describe how two contacts are related — for example 'colleague', 'spouse' or 'referred by'."
- name: Pipelines
  description: "Your sales processes and the deal stages within them. Each product or service group can have its own pipeline."
- name: Statuses
  description: "The stages a contact moves through in your sales process. The list comes pre-populated and can be edited to fit your account."
- name: Lead Sources
  description: "How a contact first came to you. Like statuses, this list is pre-populated and can be edited to fit your account."
- name: Filters
  description: "Saved, custom queries over your contacts. Filters are created in the app and can then be applied through the API."
- name: Predefined Actions
  description: "Reusable action templates for steps you take often (called 'Saved Actions' in the app)."
- name: Predefined Items
  description: "A configurable list of products or services, used to standardize deal creation."
- name: Predefined Action Groups
  description: "Groups of predefined actions that can be applied together as a workflow."
- name: Predefined Item Groups
  description: "Groups of predefined deal items that are sold together or complement one another."
- name: Custom Fields
  description: "Extra, user-defined fields on contacts. Configurable by admins."
- name: Company Fields
  description: "Extra, user-defined fields on companies. Configurable by admins."
- name: Deal Fields
  description: "Extra, user-defined fields on deals. Configurable by admins."
- name: Notifications
  description: "The logged user's in-app notifications (excludes email and link notifications)."
- name: Countries
  description: "The countries OnePageCRM supports, with their ISO-3166 codes."
- name: Web Hooks
  description: "A simple way to be notified when records change in OnePageCRM. Subscribe an endpoint and OnePageCRM POSTs each event as it happens."
paths:
  /bootstrap:
    get:
      operationId: getBootstrap
      summary: Get useful information about the logged API user's account
      description: "Includes global account configuration such as lead sources and deal stages, and user-specific configuration such as date format and time zone."
      parameters: []
      tags:
      - Bootstrap
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                properties:
                  status:
                    $ref: '#/components/schemas/Success/properties/status'
                  message:
                    $ref: '#/components/schemas/Success/properties/message'
                  timestamp:
                    $ref: '#/components/schemas/Success/properties/timestamp'
                  data:
                    $ref: '#/components/schemas/Bootstrap'
                  lead_sources:
                    $ref: '#/components/schemas/Lead_source'
                  statuses:
                    $ref: '#/components/schemas/Status'
                  tags:
                    description: >-
                      Tags provide a means to classify contacts by however many
                      tags you choose to attach to them. There are 2 types of
                      tags, tags and system tags
                    properties:
                      tags:
                        description: >-
                          An array of custom tags. A custom tag is a user created tag used for categorising contacts
                        type: array
                        items:
                          $ref: '#/components/schemas/Tag'
                      system_tags:
                        description: >-
                          An array of system tags. A system tag is a system
                          generate tag used for categorising contacts
                        type: array
                        items:
                          $ref: '#/components/schemas/Tag'
                  contacts_count:
                    $ref: '#/components/schemas/Contacts_count'
                  team_stream:
                    $ref: '#/components/schemas/Team_stream'
        400:
          $ref: '#/components/responses/400'
        401:
          $ref: '#/components/responses/401'
  /change_auth_key:
    post:
      operationId: changeAuthKey
      summary: Invalidate the current API key and return a new API key
      description: >-
        **Warning:** This will change the users authentication key, and therefore log them out of all applications. Note: this includes the mobile applications.
      tags:
      - Bootstrap
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                properties:
                  status:
                    $ref: '#/components/schemas/Success/properties/status'
                  message:
                    $ref: '#/components/schemas/Success/properties/message'
                  timestamp:
                    $ref: '#/components/schemas/Success/properties/timestamp'
                  data:
                    properties:
                      auth_key:
                        description: New API Key
                        type: string
                        example: wbJBo+odEikiDOjdnL+P+0fl+Dbgk84747jFtyOZghs=
        400:
          $ref: '#/components/responses/400'
        401:
          $ref: '#/components/responses/401'
