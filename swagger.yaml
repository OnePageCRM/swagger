    query_contacts_fields:
      name: fields
      in: query
      required: false
      description: |
        Include related resources alongside each contact in the response. Syntax: `fields=<resource>(all)`. Use a comma-separated list to request multiple resources. Each requested resource is returned as an array of full objects nested under the matching key inside the contact entry
        (e.g. `fields=calls(all)` adds a `calls` array next to `contact` for each item in the `contacts` array).
        Supported resources: `deals`, `notes`, `calls`, `meetings`, `pinned_attachments`. Examples: `fields=calls(all)` `fields=calls(all),notes(all)` `fields=deals(all),notes(all),calls(all),meetings(all),pinned_attachments(all)`
      schema:
        type: string
        example: calls(all),notes(all)
    query_deals_filter_id:
      name: filter_id
      in: query
      required: false
      description: >-
        Apply filter to deal listing (only use one of `contact_id`, `company_id`, `tag` or `filter_id` at a time)
      schema:
        type: string
        example: 5ae9cc2a9007ba5b856c7bb8
    query_deals_fields:
      name: fields
      in: query
      required: false
      description: |
        Include related resources alongside each deal in the response. Syntax: `fields=<resource>(all)`. Use a comma-separated list to request multiple resources. Supported resources: `contacts`. When `fields=contacts(all)` is supplied, each deal entry includes a `contacts` array
        of full `Contact` objects (the primary contact plus any linked contacts). The short-form
        `linked_contacts` array on each deal is always returned regardless of this parameter. Example: `fields=contacts(all)`
      schema:
        type: string
        example: contacts(all)
    query_actions_date_filter:
