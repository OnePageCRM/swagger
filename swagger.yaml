    post:
      operationId: createContact
      summary: Create a contact
      description: "Creates a contact. Provide last_name or company_name — one of the two is required. owner_id defaults to the calling user and status_id to lead. company_name links the contact to an existing company (matched case-insensitively) or creates one; company_id is ignored on create. Optional next_action_name (max 140 characters) creates the contact's first next action, with next_action_date set to asap, waiting or a YYYY-MM-DD date."
      tags:
      - Contacts
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                title:
                  $ref: '#/components/schemas/Contact/properties/title'
                first_name:
                  $ref: '#/components/schemas/Contact/properties/first_name'
                last_name:
                  $ref: '#/components/schemas/Contact/properties/last_name'
                job_title:
                  $ref: '#/components/schemas/Contact/properties/job_title'
